# devd rule for virtio_drm host scanout resize.
#
# Install as /usr/local/etc/devd/virtio_drm.conf and
# `service devd restart`.  Pair with /usr/local/sbin/virtio_drm_resize
# from the same tools/ directory.
#
# The driver posts a notification on every VIRTIO_GPU_EVENT_DISPLAY:
#
#   system=DRM subsystem=vgpu0 type=RESIZE data="WIDTH=W HEIGHT=H SCANOUT=N"
#
# The helper walks the running X session(s) and runs
# `xrandr --output Virtual-1 --auto` so the new host dimensions
# become the active mode.

notify 0 {
	match "system"		"DRM";
	match "subsystem"	"vgpu0";
	match "type"		"RESIZE";
	action "/usr/local/sbin/virtio_drm_resize $width $height";
};
